server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: library-seat-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_seat_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.library.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: library-seat-system-jwt-secret-key-2026-library-management
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

system:
  check-in-grace-period: 30
  reservation:
    max-per-user: 1
    advance-booking-days: 7
    min-duration-minutes: 30
    max-duration-hours: 8

logging:
  level:
    com.library: debug
    org.springframework.web: info
